name: ci

on:
  push:
    branches: [main, master, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy over SSH (Stable)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 45m

          script: |
            set -e
            cd /v3/notification-service
            
            echo "📦 Sync code"
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Get short SHA for precise tagging
            export SHA=$(git rev-parse --short HEAD)
            
            echo "🌐 Fix docker timeout"
            export DOCKER_CLIENT_TIMEOUT=600
            export COMPOSE_HTTP_TIMEOUT=600
            
            echo "📥 Pull image only if missing"
            docker images | grep node:20-bullseye || docker pull node:20-bullseye
            
            echo "🐳 Build"
            docker build -t notification-service:${SHA} . \
              || (sleep 5 && docker build -t notification-service:${SHA} .)
            
            echo "📦 Import to k3s"
            docker save notification-service:${SHA} | sudo k3s ctr images import -
            
            echo "🚀 Update deployment image"
            kubectl set image deployment/notification-service notification-service=notification-service:${SHA} -n default