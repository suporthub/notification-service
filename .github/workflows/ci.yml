name: ci

on:
  push:
    branches: [main, master, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy securely over SSH (Optimized)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          command_timeout: 20m   # ✅ FIX 1: Increase timeout

          script: |
            set -e
            cd /v3/notification-service
            
            # Sync with GitHub
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # ✅ FIX 2: REMOVE --no-cache (VERY IMPORTANT)
            docker build -t notification-service:local .
            
            # Import into k3s
            docker save notification-service:local | sudo k3s ctr images import -
            
            # Restart deployment
            kubectl rollout restart deployment/notification-service -n default